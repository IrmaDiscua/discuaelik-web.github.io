<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#ff66b3" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Closet Play" />
  <title>Closet Play</title>
  <style>
:root {
  --pink: #ff66b3;
  --pink-dark: #e94398;
  --pink-soft: #ffe4f2;
  --lilac: #9b7cff;
  --lilac-soft: #eee9ff;
  --blue: #72c7ff;
  --blue-soft: #e4f5ff;
  --yellow: #ffd86b;
  --ink: #2d2940;
  --muted: #746f84;
  --surface: #ffffff;
  --background: #fff7fc;
  --line: #eee7f0;
  --shadow: 0 12px 32px rgba(90, 44, 92, .12);
  --radius: 24px;
  font-family: Inter, ui-rounded, "SF Pro Rounded", "SF Pro Display", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

* { box-sizing: border-box; }
html { background: var(--background); }
body { margin: 0; background: linear-gradient(180deg, #fff7fc 0%, #f7f3ff 100%); color: var(--ink); min-height: 100vh; }
button, input, select { font: inherit; }
button { cursor: pointer; }

.app-shell { min-height: 100vh; max-width: 560px; margin: 0 auto; background: rgba(255,255,255,.64); position: relative; box-shadow: 0 0 70px rgba(78, 45, 97, .08); }
.topbar { position: sticky; top: 0; z-index: 20; display: grid; grid-template-columns: 48px 1fr 48px; align-items: center; gap: 10px; padding: calc(12px + env(safe-area-inset-top)) 18px 12px; background: rgba(255, 250, 253, .92); backdrop-filter: blur(18px); border-bottom: 1px solid rgba(238,231,240,.75); }
.brand-wrap { display: flex; justify-content: center; align-items: center; gap: 9px; text-align: left; }
.brand-mark { width: 36px; height: 36px; display: grid; place-items: center; border-radius: 12px; background: linear-gradient(145deg, var(--pink), var(--lilac)); color: white; box-shadow: 0 8px 16px rgba(255,102,179,.25); }
.topbar h1 { margin: 0; font-size: 19px; letter-spacing: -.4px; }
.topbar p { margin: 1px 0 0; font-size: 11px; color: var(--muted); }
.icon-button { width: 42px; height: 42px; border: 0; border-radius: 15px; background: white; box-shadow: 0 5px 16px rgba(70,40,80,.08); font-size: 18px; }

.app-content { padding: 18px 18px calc(104px + env(safe-area-inset-bottom)); min-height: calc(100vh - 75px); }
.screen-header { display: flex; align-items: flex-end; justify-content: space-between; gap: 12px; margin-bottom: 18px; }
.screen-header h2 { margin: 0; font-size: 27px; letter-spacing: -.8px; }
.screen-header p { margin: 5px 0 0; color: var(--muted); font-size: 14px; }
.eyebrow { text-transform: uppercase; letter-spacing: 1.3px; color: var(--pink-dark); font-size: 10px !important; font-weight: 800; margin: 0 0 5px !important; }

.hero-card { position: relative; overflow: hidden; border-radius: 30px; padding: 24px; min-height: 205px; background: linear-gradient(135deg, #ff9dce, #a58aff 65%, #7fd2ff); color: white; box-shadow: 0 18px 40px rgba(155,124,255,.25); }
.hero-card::before, .hero-card::after { content: ""; position: absolute; border-radius: 50%; background: rgba(255,255,255,.17); }
.hero-card::before { width: 150px; height: 150px; right: -45px; top: -55px; }
.hero-card::after { width: 110px; height: 110px; left: -35px; bottom: -55px; }
.hero-card h2 { position: relative; margin: 3px 0 8px; font-size: 29px; line-height: 1.05; max-width: 250px; }
.hero-card p { position: relative; margin: 0; max-width: 280px; font-size: 14px; line-height: 1.45; opacity: .94; }
.hero-actions { position: relative; display: flex; gap: 10px; margin-top: 20px; }
.hero-badge { position: absolute; right: 17px; bottom: 15px; font-size: 57px; transform: rotate(-8deg); filter: drop-shadow(0 10px 8px rgba(60,28,80,.15)); }

.primary-button, .secondary-button, .ghost-button { border: 0; border-radius: 16px; padding: 13px 17px; font-weight: 800; }
.primary-button { background: linear-gradient(135deg, var(--pink), var(--pink-dark)); color: white; box-shadow: 0 9px 19px rgba(233,67,152,.24); }
.secondary-button { background: white; color: var(--pink-dark); }
.ghost-button { background: var(--pink-soft); color: var(--pink-dark); }
.small-button { padding: 9px 12px; border-radius: 13px; border: 0; background: white; color: var(--pink-dark); font-weight: 800; box-shadow: 0 5px 14px rgba(90,44,92,.08); }

.section-title { display: flex; justify-content: space-between; align-items: center; margin: 24px 2px 12px; }
.section-title h3 { margin: 0; font-size: 18px; }
.section-title button { border: 0; background: transparent; color: var(--pink-dark); font-weight: 800; }
.stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 16px; }
.stat-card { background: white; border: 1px solid var(--line); border-radius: 20px; padding: 15px 11px; text-align: center; box-shadow: 0 8px 22px rgba(75,47,89,.06); }
.stat-card span { display: block; font-size: 23px; margin-bottom: 4px; }
.stat-card strong { display: block; font-size: 20px; }
.stat-card small { color: var(--muted); font-size: 11px; }

.quick-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.quick-card { border: 0; border-radius: 23px; padding: 18px; text-align: left; min-height: 126px; position: relative; overflow: hidden; color: var(--ink); }
.quick-card:nth-child(1) { background: var(--pink-soft); }
.quick-card:nth-child(2) { background: var(--lilac-soft); }
.quick-card:nth-child(3) { background: var(--blue-soft); }
.quick-card:nth-child(4) { background: #fff2c9; }
.quick-card span { font-size: 31px; display: block; margin-bottom: 12px; }
.quick-card strong { display: block; font-size: 15px; }
.quick-card small { display: block; color: var(--muted); margin-top: 4px; line-height: 1.25; }

.bottom-nav { position: fixed; z-index: 25; left: 50%; transform: translateX(-50%); bottom: 0; width: min(560px, 100%); display: grid; grid-template-columns: repeat(5, 1fr); align-items: end; padding: 8px 8px calc(7px + env(safe-area-inset-bottom)); background: rgba(255,255,255,.94); backdrop-filter: blur(20px); border-top: 1px solid var(--line); box-shadow: 0 -8px 28px rgba(79,47,90,.08); }
.nav-item { border: 0; background: transparent; color: #9a94a5; display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 7px 3px; border-radius: 17px; min-width: 0; }
.nav-item span { font-size: 20px; }
.nav-item small { font-size: 10px; white-space: nowrap; }
.nav-item.active { color: var(--pink-dark); background: var(--pink-soft); }
.create-nav { margin-top: -26px; }
.create-nav span { width: 50px; height: 50px; display: grid; place-items: center; border-radius: 18px; background: linear-gradient(135deg, var(--pink), var(--lilac)); color: white; font-size: 31px; box-shadow: 0 10px 24px rgba(155,124,255,.3); }
.create-nav.active { background: transparent; }
.create-nav small { margin-top: 1px; }

.category-strip { display: flex; gap: 9px; overflow-x: auto; padding: 2px 1px 9px; scrollbar-width: none; }
.category-strip::-webkit-scrollbar { display: none; }
.category-chip { flex: 0 0 auto; border: 1px solid var(--line); background: white; color: var(--muted); padding: 10px 14px; border-radius: 999px; font-weight: 750; }
.category-chip.active { border-color: transparent; background: linear-gradient(135deg, var(--pink), var(--lilac)); color: white; box-shadow: 0 7px 18px rgba(155,124,255,.2); }
.wardrobe-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 13px; margin-top: 10px; }
.clothing-card { border: 1px solid var(--line); background: white; border-radius: 23px; overflow: hidden; box-shadow: 0 9px 22px rgba(73,46,86,.07); position: relative; }
.clothing-image { aspect-ratio: 1 / 1; background: linear-gradient(145deg,#fff6fb,#f0edff); display: grid; place-items: center; overflow: hidden; font-size: 56px; }
.clothing-image img { width: 100%; height: 100%; object-fit: cover; }
.clothing-info { padding: 12px; }
.clothing-info strong { display: block; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.clothing-info small { color: var(--muted); display: block; margin-top: 3px; }
.favorite-toggle, .delete-item { position: absolute; top: 9px; width: 34px; height: 34px; border-radius: 13px; border: 0; background: rgba(255,255,255,.9); box-shadow: 0 5px 14px rgba(70,40,80,.1); }
.favorite-toggle { right: 9px; }
.delete-item { left: 9px; opacity: 0; transition: .2s; }
.clothing-card:hover .delete-item { opacity: 1; }
.empty-state { grid-column: 1 / -1; text-align: center; padding: 38px 20px; background: white; border: 1px dashed #d9cfe0; border-radius: 25px; }
.empty-state span { font-size: 52px; }
.empty-state h3 { margin: 12px 0 5px; }
.empty-state p { color: var(--muted); margin: 0 0 18px; }

.look-builder { display: grid; gap: 14px; }
.look-stage { background: linear-gradient(155deg,#fff,#f4edff); border: 1px solid var(--line); border-radius: 30px; padding: 18px; box-shadow: var(--shadow); }
.look-stage-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
.look-stage-top h3 { margin: 0; }
.look-slots { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.look-slot { min-height: 150px; border: 2px dashed #decfe4; border-radius: 23px; background: rgba(255,255,255,.68); display: flex; align-items: center; justify-content: center; text-align: center; overflow: hidden; position: relative; padding: 8px; }
.look-slot img { width: 100%; height: 100%; object-fit: cover; border-radius: 17px; }
.look-slot .emoji { font-size: 43px; display: block; }
.look-slot small { color: var(--muted); display: block; margin-top: 5px; }
.look-slot.filled { border-style: solid; border-color: white; }
.slot-label { position: absolute; left: 9px; bottom: 8px; padding: 5px 8px; background: rgba(45,41,64,.75); color: white; border-radius: 9px; font-size: 10px; font-weight: 800; }
.builder-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.builder-actions .primary-button { grid-column: 1 / -1; }
.picker-panel { background: white; border: 1px solid var(--line); border-radius: 25px; padding: 16px; }
.picker-panel h3 { margin: 0 0 12px; font-size: 17px; }
.picker-items { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 5px; scrollbar-width: none; }
.picker-item { flex: 0 0 92px; border: 2px solid transparent; border-radius: 18px; padding: 7px; background: #faf7fc; text-align: center; }
.picker-item.active { border-color: var(--pink); background: var(--pink-soft); }
.picker-thumb { height: 77px; border-radius: 13px; overflow: hidden; background: white; display: grid; place-items: center; font-size: 35px; }
.picker-thumb img { width: 100%; height: 100%; object-fit: cover; }
.picker-item small { display: block; margin-top: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

.calendar-card { background: white; border: 1px solid var(--line); border-radius: 27px; padding: 17px; box-shadow: var(--shadow); }
.calendar-toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
.calendar-toolbar h3 { margin: 0; text-transform: capitalize; }
.calendar-toolbar button { width: 36px; height: 36px; border: 0; border-radius: 12px; background: var(--lilac-soft); color: var(--lilac); font-weight: 900; }
.weekdays, .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }
.weekdays span { text-align: center; font-size: 10px; color: var(--muted); font-weight: 800; padding: 6px 0; }
.day-button { aspect-ratio: 1; border: 0; border-radius: 13px; background: transparent; color: var(--ink); position: relative; font-size: 12px; }
.day-button:hover { background: var(--pink-soft); }
.day-button.today { outline: 2px solid var(--pink); }
.day-button.selected { background: linear-gradient(135deg, var(--pink), var(--lilac)); color: white; }
.day-button.has-look::after { content: ""; position: absolute; width: 5px; height: 5px; border-radius: 50%; background: var(--blue); bottom: 4px; left: 50%; transform: translateX(-50%); }
.day-button.selected.has-look::after { background: white; }
.day-button.blank { pointer-events: none; }
.schedule-panel { margin-top: 15px; background: var(--blue-soft); border-radius: 22px; padding: 16px; }
.schedule-panel h3 { margin: 0 0 5px; }
.schedule-panel p { color: var(--muted); margin: 0 0 13px; font-size: 13px; }
.schedule-select { width: 100%; border: 1px solid #dbe8ef; border-radius: 14px; padding: 12px; background: white; margin-bottom: 10px; color: var(--ink); }

.look-card { background: white; border: 1px solid var(--line); border-radius: 25px; padding: 15px; margin-bottom: 13px; box-shadow: 0 8px 20px rgba(70,40,80,.06); }
.look-card-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.look-card-head h3 { margin: 0; font-size: 16px; }
.look-card-head small { color: var(--muted); }
.look-preview { display: grid; grid-template-columns: repeat(4, 1fr); gap: 7px; }
.look-piece { aspect-ratio: 1; border-radius: 14px; overflow: hidden; background: linear-gradient(145deg,#fff3fa,#eee9ff); display: grid; place-items: center; font-size: 24px; }
.look-piece img { width: 100%; height: 100%; object-fit: cover; }
.look-card-actions { display: flex; justify-content: flex-end; gap: 7px; margin-top: 11px; }
.look-card-actions button { border: 0; padding: 8px 11px; border-radius: 11px; font-weight: 800; }

.modal-backdrop { position: fixed; inset: 0; z-index: 50; background: rgba(30,20,40,.36); backdrop-filter: blur(4px); }
.modal { position: fixed; z-index: 60; left: 50%; transform: translateX(-50%); bottom: 0; width: min(560px,100%); max-height: 92vh; overflow-y: auto; border-radius: 30px 30px 0 0; background: white; padding: 12px 20px calc(24px + env(safe-area-inset-bottom)); box-shadow: 0 -18px 50px rgba(45,30,56,.22); }
.modal-handle { width: 45px; height: 5px; border-radius: 999px; background: #ddd4e1; margin: 0 auto 12px; }
.modal-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 15px; margin-bottom: 17px; }
.modal-header h2 { margin: 0; font-size: 23px; }
.close-button { border: 0; background: var(--pink-soft); color: var(--pink-dark); width: 39px; height: 39px; border-radius: 14px; font-size: 25px; }
.form-grid { display: grid; gap: 14px; }
.form-grid label { font-size: 13px; color: var(--muted); font-weight: 700; }
.form-grid input, .form-grid select { width: 100%; border: 1px solid var(--line); border-radius: 14px; padding: 13px; color: var(--ink); background: #fff; margin-top: 6px; outline: none; }
.form-grid input:focus, .form-grid select:focus { border-color: var(--pink); box-shadow: 0 0 0 3px var(--pink-soft); }
.two-columns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.photo-picker { border: 2px dashed #d9cde0; border-radius: 23px; padding: 22px; text-align: center; background: #fcf9ff; }
.photo-picker input { display: none; }
.photo-picker span { display: grid; place-items: center; margin: 0 auto 10px; width: 86px; height: 86px; border-radius: 22px; background: white; font-size: 39px; overflow: hidden; }
.photo-picker span img { width: 100%; height: 100%; object-fit: cover; }
.photo-picker strong, .photo-picker small { display: block; }
.photo-picker small { margin-top: 4px; font-weight: 500; }
.settings-list { display: grid; gap: 10px; }
.settings-row { display: grid; grid-template-columns: 42px 1fr 20px; align-items: center; gap: 10px; width: 100%; border: 1px solid var(--line); background: white; padding: 14px; border-radius: 18px; text-align: left; color: var(--ink); }
.settings-row > span { width: 42px; height: 42px; border-radius: 14px; display: grid; place-items: center; background: var(--lilac-soft); }
.settings-row strong, .settings-row small { display: block; }
.settings-row small { color: var(--muted); margin-top: 3px; }
.settings-row b { color: var(--muted); font-size: 22px; }
.settings-row.danger strong { color: #c63b6f; }
.toast { position: fixed; z-index: 90; left: 50%; transform: translateX(-50%); bottom: calc(92px + env(safe-area-inset-bottom)); background: #2d2940; color: white; padding: 12px 17px; border-radius: 15px; box-shadow: var(--shadow); font-size: 13px; max-width: calc(100% - 36px); text-align: center; }

/* Vestidor digital */
.tryon-button { grid-column: 1 / -1; border: 0; border-radius: 18px; padding: 14px 17px; font-weight: 900; background: linear-gradient(135deg, #8f73ff, #ff66b3); color: white; box-shadow: 0 10px 22px rgba(155,124,255,.24); }
.avatar-page { display: grid; gap: 15px; }
.avatar-toolbar { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
.avatar-back { border: 0; border-radius: 14px; background: white; color: var(--pink-dark); padding: 10px 13px; font-weight: 850; box-shadow: 0 5px 14px rgba(90,44,92,.08); }
.avatar-card { background: linear-gradient(160deg,#fff,#f1ebff); border: 1px solid var(--line); border-radius: 31px; padding: 16px; box-shadow: var(--shadow); overflow: hidden; }
.mannequin-canvas { position: relative; width: min(100%, 350px); height: 555px; margin: 0 auto; border-radius: 28px; overflow: hidden; background: radial-gradient(circle at 50% 22%, rgba(255,255,255,.95), rgba(255,229,244,.78) 44%, rgba(231,225,255,.92)); border: 1px solid rgba(255,255,255,.86); }
.mannequin-canvas::before { content: ""; position: absolute; inset: 18px; border: 1px dashed rgba(155,124,255,.22); border-radius: 23px; }
.avatar-shadow { position:absolute; width:180px; height:28px; left:50%; bottom:16px; transform:translateX(-50%); border-radius:50%; background:rgba(69,44,78,.12); filter:blur(4px); }
.avatar-head { position:absolute; z-index:3; left:50%; top:43px; transform:translateX(-50%); width:78px; height:92px; border-radius:45% 45% 48% 48%; background:var(--skin); box-shadow:inset 0 -5px 0 rgba(91,48,45,.06); }
.avatar-neck { position:absolute; z-index:2; left:50%; top:125px; transform:translateX(-50%); width:31px; height:37px; border-radius:10px; background:var(--skin); }
.avatar-ear { position:absolute; z-index:2; top:76px; width:15px; height:26px; border-radius:50%; background:var(--skin); }
.avatar-ear.left { left:calc(50% - 46px); } .avatar-ear.right { right:calc(50% - 46px); }
.avatar-face::before, .avatar-face::after { content:""; position:absolute; z-index:5; top:85px; width:7px; height:3px; border-radius:50%; background:#493641; }
.avatar-face::before { left:calc(50% - 22px); } .avatar-face::after { right:calc(50% - 22px); }
.avatar-mouth { position:absolute; z-index:5; top:108px; left:50%; width:17px; height:7px; transform:translateX(-50%); border-bottom:2px solid #b15b76; border-radius:50%; }
.avatar-torso { position:absolute; z-index:1; left:50%; top:151px; transform:translateX(-50%); width:132px; height:146px; background:var(--skin); clip-path:polygon(19% 0,81% 0,95% 31%,83% 100%,17% 100%,5% 31%); }
.avatar-arm { position:absolute; z-index:1; top:164px; width:31px; height:224px; border-radius:25px; background:var(--skin); transform-origin:top center; }
.avatar-arm.left { left:77px; transform:rotate(5deg); } .avatar-arm.right { right:77px; transform:rotate(-5deg); }
.avatar-hand { position:absolute; z-index:1; top:370px; width:31px; height:45px; border-radius:50% 50% 45% 45%; background:var(--skin); }
.avatar-hand.left { left:88px; } .avatar-hand.right { right:88px; }
.avatar-leg { position:absolute; z-index:1; top:285px; width:51px; height:237px; background:var(--skin); clip-path:polygon(5% 0,95% 0,74% 100%,24% 100%); }
.avatar-leg.left { left:calc(50% - 53px); } .avatar-leg.right { right:calc(50% - 53px); }
.hair { position:absolute; z-index:4; left:50%; transform:translateX(-50%); background:var(--hair); }
.hair.cap { top:34px; width:91px; height:57px; border-radius:51% 51% 32% 32%; clip-path:polygon(0 0,100% 0,94% 100%,73% 69%,51% 83%,25% 65%,7% 100%); }
.hair.long { top:40px; width:108px; height:155px; border-radius:48% 48% 36% 36%; clip-path:polygon(6% 0,94% 0,100% 100%,76% 92%,72% 33%,28% 33%,24% 92%,0 100%); z-index:2; }
.hair.bob { top:37px; width:99px; height:117px; border-radius:48% 48% 39% 39%; clip-path:polygon(5% 0,95% 0,100% 85%,78% 100%,72% 35%,28% 35%,22% 100%,0 85%); z-index:2; }
.hair.bun { top:18px; width:42px; height:42px; border-radius:50%; z-index:2; }
.hair.bun + .hair.cap { display:block; }
.garment { position:absolute; z-index:6; overflow:hidden; background:var(--garment,#dfb8ff); box-shadow:0 7px 14px rgba(60,38,73,.13); border:2px solid rgba(255,255,255,.78); }
.garment img { width:100%; height:100%; object-fit:cover; display:block; }
.garment .garment-fallback { width:100%; height:100%; display:grid; place-items:center; font-size:34px; background:linear-gradient(145deg,var(--garment),rgba(255,255,255,.55)); }
.garment .garment-name { position:absolute; left:50%; bottom:6px; transform:translateX(-50%); max-width:88%; padding:4px 7px; border-radius:8px; background:rgba(45,41,64,.72); color:white; font-size:9px; font-weight:800; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.garment-top { left:50%; top:148px; transform:translateX(-50%); width:145px; height:153px; clip-path:polygon(18% 0,37% 8%,63% 8%,82% 0,100% 27%,86% 43%,80% 100%,20% 100%,14% 43%,0 27%); }
.garment-bottom { left:50%; top:286px; transform:translateX(-50%); width:143px; height:220px; clip-path:polygon(7% 0,93% 0,79% 100%,55% 100%,50% 31%,45% 100%,21% 100%); }
.garment-dress { left:50%; top:148px; transform:translateX(-50%); width:190px; height:365px; clip-path:polygon(24% 0,39% 7%,61% 7%,76% 0,91% 19%,79% 31%,72% 42%,94% 100%,6% 100%,28% 42%,21% 31%,9% 19%); }
.garment-shoes { left:50%; bottom:24px; transform:translateX(-50%); width:146px; height:56px; display:grid; grid-template-columns:1fr 1fr; gap:15px; background:transparent; border:0; box-shadow:none; overflow:visible; }
.shoe-piece { overflow:hidden; border-radius:50% 50% 20% 20%; background:var(--garment); border:2px solid rgba(255,255,255,.82); box-shadow:0 5px 10px rgba(60,38,73,.12); }
.shoe-piece img { width:100%; height:100%; object-fit:cover; }
.garment-accessory { right:31px; top:272px; width:69px; height:77px; border-radius:22px; transform:rotate(5deg); }
.empty-garment { position:absolute; z-index:6; left:50%; transform:translateX(-50%); padding:7px 10px; border-radius:12px; background:rgba(255,255,255,.75); color:var(--muted); font-size:10px; font-weight:800; border:1px dashed #d8c9e1; }
.empty-garment.top { top:195px; } .empty-garment.bottom { top:341px; } .empty-garment.shoes { bottom:42px; }
.avatar-controls { display:grid; gap:13px; background:white; border:1px solid var(--line); border-radius:26px; padding:17px; }
.control-group h3 { margin:0 0 9px; font-size:14px; }

.style-option { padding:0 13px; min-width:auto; }
.avatar-note { margin:0; padding:12px 14px; border-radius:18px; background:var(--blue-soft); color:var(--muted); font-size:12px; line-height:1.45; }
.avatar-actions { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.avatar-actions .primary-button { grid-column:1 / -1; }
@media (max-width:380px) { .mannequin-canvas { transform-origin:top center; } .avatar-arm.left { left:69px; } .avatar-arm.right { right:69px; } }

  <div id="toast" class="toast hidden" role="status"></div>
  <script>
const STORAGE_KEY = 'closetPlayDataV1';
const categoryLabels = {
  all: 'Todo', tops: 'Blusas', bottoms: 'Pantalones', dresses: 'Vestidos',
  outerwear: 'Chaquetas', shoes: 'Zapatos', accessories: 'Accesorios'
};
const categoryEmoji = {
  tops: '👚', bottoms: '👖', dresses: '👗', outerwear: '🧥', shoes: '👟', accessories: '👜'
};
const slotConfig = [
  { key: 'top', label: 'Parte superior', categories: ['tops', 'dresses', 'outerwear'], emoji: '👚' },
  { key: 'bottom', label: 'Parte inferior', categories: ['bottoms'], emoji: '👖' },
  { key: 'shoes', label: 'Zapatos', categories: ['shoes'], emoji: '👟' },
  { key: 'accessory', label: 'Accesorio', categories: ['accessories'], emoji: '👜' }
];

let currentScreen = 'home';
let currentCategory = 'all';
let currentPickerSlot = 'top';
let currentLook = { top: null, bottom: null, shoes: null, accessory: null };
let selectedDate = dateKey(new Date());
let calendarCursor = new Date(new Date().getFullYear(), new Date().getMonth(), 1);
let deferredInstallPrompt = null;
let photoDataUrl = '';

const app = document.getElementById('app');
const modalBackdrop = document.getElementById('modalBackdrop');
const addItemModal = document.getElementById('addItemModal');
const settingsModal = document.getElementById('settingsModal');
const toast = document.getElementById('toast');

function seedData() {
  return {
    items: [
      { id: uid(), name: 'Top rosa nube', category: 'tops', color: 'Rosa', style: 'Juvenil', emoji: '👚', image: '', favorite: true },
      { id: uid(), name: 'Jeans azul claro', category: 'bottoms', color: 'Azul', style: 'Casual', emoji: '👖', image: '', favorite: false },
      { id: uid(), name: 'Tenis blancos', category: 'shoes', color: 'Blanco', style: 'Casual', emoji: '👟', image: '', favorite: true },
      { id: uid(), name: 'Bolso lila', category: 'accessories', color: 'Lila', style: 'Juvenil', emoji: '👜', image: '', favorite: true },
      { id: uid(), name: 'Vestido primavera', category: 'dresses', color: 'Multicolor', style: 'Elegante', emoji: '👗', image: '', favorite: false },
      { id: uid(), name: 'Chaqueta denim', category: 'outerwear', color: 'Azul', style: 'Casual', emoji: '🧥', image: '', favorite: false }
    ],
    looks: [],
    schedule: {},
    avatar: { skin: '#e6b18d', hair: '#4b2f2a', hairStyle: 'long' },
    onboarded: true
  };
}

function loadData() {
  const fresh = seedData();
  try {
    const saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
    if (!saved || !saved.items) return fresh;
    return {
      ...fresh,
      ...saved,
      avatar: { ...fresh.avatar, ...(saved.avatar || {}) }
    };
  } catch {
    return fresh;
  }
}
let data = loadData();
saveData();

function saveData() { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }
function uid() { return `${Date.now().toString(36)}${Math.random().toString(36).slice(2,8)}`; }
function dateKey(date) {
  const y = date.getFullYear();
  const m = String(date.getMonth() + 1).padStart(2, '0');
  const d = String(date.getDate()).padStart(2, '0');
  return `${y}-${m}-${d}`;
}
function escapeHtml(value = '') {
  return String(value).replace(/[&<>'"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));
}
function itemVisual(item) {
  if (!item) return '';
  return item.image ? `<img src="${item.image}" alt="${escapeHtml(item.name)}">` : `<span>${item.emoji || categoryEmoji[item.category]}</span>`;
}
function showToast(message) {
  toast.textContent = message;
  toast.classList.remove('hidden');
  clearTimeout(showToast.timer);
  showToast.timer = setTimeout(() => toast.classList.add('hidden'), 2400);
}
function openModal(modal) {
  modalBackdrop.classList.remove('hidden');
  modal.classList.remove('hidden');
}
function closeModals() {
  modalBackdrop.classList.add('hidden');
  document.querySelectorAll('.modal').forEach(m => m.classList.add('hidden'));
}
function formatSelectedDate(key) {
  return new Intl.DateTimeFormat('es-HN', { weekday: 'long', day: 'numeric', month: 'long' }).format(new Date(`${key}T12:00:00`));
}

function navigate(screen) {
  currentScreen = screen;
  document.querySelectorAll('.nav-item').forEach(btn => btn.classList.toggle('active', btn.dataset.screen === (screen === 'mannequin' ? 'create' : screen)));
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function render() {
  const screens = { home: renderHome, wardrobe: renderWardrobe, create: renderCreate, mannequin: renderMannequin, calendar: renderCalendar, favorites: renderFavorites };
  app.innerHTML = screens[currentScreen]();
  bindScreenEvents();
}

        <div class="hero-actions">

        <button class="quick-card" data-random-look><span>🎲</span><strong>Sorpréndeme</strong><small>Genera una combinación al azar</small></button>

}

function renderWardrobe() {
  const categories = Object.keys(categoryLabels);
  const items = currentCategory === 'all' ? data.items : data.items.filter(i => i.category === currentCategory);

      <div class="screen-header">
        <div><p class="eyebrow">Tu colección</p><h2>Mi armario</h2><p>${data.items.length} prendas registradas</p></div>
        <button class="small-button" data-open-add>＋ Agregar</button>
      </div>
      <div class="category-strip">
        ${categories.map(cat => `<button class="category-chip ${currentCategory === cat ? 'active' : ''}" data-category="${cat}">${categoryLabels[cat]}</button>`).join('')}
      </div>
      <div class="wardrobe-grid">

          <article class="clothing-card">
            <div class="clothing-image">${itemVisual(item)}</div>

            <button class="favorite-toggle" data-favorite-item="${item.id}" aria-label="Favorito">${item.favorite ? '💖' : '🤍'}</button>

          </article>`).join('') : `
          <div class="empty-state"><span>🛍️</span><h3>Aquí todavía no hay prendas</h3><p>Agrega una foto para comenzar.</p><button class="primary-button" data-open-add>Agregar prenda</button></div>`}
      </div>
    </section>`;
}

function renderCreate() {
  const currentSlot = slotConfig.find(s => s.key === currentPickerSlot);
  const available = data.items.filter(i => currentSlot.categories.includes(i.category));
  return `
    <section>
      <div class="screen-header"><div><p class="eyebrow">Laboratorio de estilo</p><h2>Crear look</h2><p>Toca cada espacio para elegir una prenda</p></div></div>
      <div class="look-builder">
        <div class="look-stage">
          <div class="look-stage-top"><h3>Mi combinación</h3><button class="small-button" data-clear-look>Limpiar</button></div>

            ${slotConfig.map(slot => {
              const item = data.items.find(i => i.id === currentLook[slot.key]);

              <div class="picker-thumb">${itemVisual(item)}</div><small>${escapeHtml(item.name)}</small>
            </button>`).join('') : `<div class="empty-state" style="min-width:100%;padding:22px"><span>📸</span><h3>Falta esta categoría</h3><p>Agrega prendas para poder combinarlas.</p><button class="primary-button" data-open-add>Agregar</button></div>`}
          </div>
        </div>
        <div class="builder-actions">

          <button class="ghost-button" data-random-look>🎲 Aleatorio</button>
          <button class="secondary-button" data-go="wardrobe">👚 Ver armario</button>
          <button class="primary-button" data-save-look>Guardar este look</button>
        </div>
      </div>
    </section>`;
}


function colorHex(name = '') {
  const colors = {
    Rosa:'#f6a8c9', Lila:'#b5a0eb', Azul:'#8cbde8', Blanco:'#f7f5f0', Negro:'#343039',
    Beige:'#d9c2a7', Verde:'#8fbf9c', Rojo:'#c96470', Multicolor:'#caa8ea'
  };
  return colors[name] || '#d7b2e8';
}

function garmentContent(item, fallbackEmoji) {
  if (!item) return '';
  const picture = item.image
    ? `<img src="${item.image}" alt="${escapeHtml(item.name)}">`
    : `<div class="garment-fallback">${item.emoji || fallbackEmoji}</div>`;
  return `${picture}<span class="garment-name">${escapeHtml(item.name)}</span>`;
}

function renderMannequin() {
  const avatar = data.avatar || { skin:'#e6b18d', hair:'#4b2f2a', hairStyle:'long' };
  const top = data.items.find(i => i.id === currentLook.top);
  const bottom = data.items.find(i => i.id === currentLook.bottom);
  const shoes = data.items.find(i => i.id === currentLook.shoes);
  const accessory = data.items.find(i => i.id === currentLook.accessory);
  const isDress = top?.category === 'dresses';
  const chosenCount = [top,bottom,shoes,accessory].filter(Boolean).length;
  const skinOptions = ['#f7d7bd','#e6b18d','#bb7d5a','#754633'];
  const hairOptions = ['#221b1a','#4b2f2a','#8b5a35','#d2a65a','#b86b5e'];
  const hairStyles = [
    {key:'long',label:'Largo'}, {key:'bob',label:'Corto'}, {key:'bun',label:'Moño'}
  ];
  return `
    <section class="avatar-page">
      <div class="avatar-toolbar">
        <button class="avatar-back" data-go="create">‹ Volver a crear</button>
        <span class="eyebrow" style="margin:0!important">Vestidor digital</span>
      </div>
      <div class="screen-header" style="margin-bottom:0"><div><h2>Ver vestuario</h2><p>${chosenCount ? 'Tu combinación sobre un maniquí ilustrado' : 'Elige prendas para comenzar'}</p></div></div>
      <div class="avatar-card">
        <div class="mannequin-canvas" style="--skin:${avatar.skin};--hair:${avatar.hair}">
          <div class="avatar-shadow"></div>
          ${avatar.hairStyle === 'long' ? '<div class="hair long"></div>' : ''}
          ${avatar.hairStyle === 'bob' ? '<div class="hair bob"></div>' : ''}
          ${avatar.hairStyle === 'bun' ? '<div class="hair bun"></div><div class="hair cap"></div>' : '<div class="hair cap"></div>'}
          <div class="avatar-ear left"></div><div class="avatar-ear right"></div>
          <div class="avatar-head"></div><div class="avatar-face"></div><div class="avatar-mouth"></div><div class="avatar-neck"></div>
          <div class="avatar-torso"></div>
          <div class="avatar-arm left"></div><div class="avatar-arm right"></div>
          <div class="avatar-hand left"></div><div class="avatar-hand right"></div>
          <div class="avatar-leg left"></div><div class="avatar-leg right"></div>
          ${top ? `<div class="garment ${isDress ? 'garment-dress' : 'garment-top'}" style="--garment:${colorHex(top.color)}">${garmentContent(top,'👚')}</div>` : '<div class="empty-garment top">Falta la parte superior</div>'}
          ${!isDress && bottom ? `<div class="garment garment-bottom" style="--garment:${colorHex(bottom.color)}">${garmentContent(bottom,'👖')}</div>` : (!isDress ? '<div class="empty-garment bottom">Falta la parte inferior</div>' : '')}
          ${shoes ? `<div class="garment-shoes" style="--garment:${colorHex(shoes.color)}"><div class="shoe-piece">${shoes.image ? `<img src="${shoes.image}" alt="${escapeHtml(shoes.name)}">` : `<div class="garment-fallback">👟</div>`}</div><div class="shoe-piece">${shoes.image ? `<img src="${shoes.image}" alt="${escapeHtml(shoes.name)}">` : `<div class="garment-fallback">👟</div>`}</div></div>` : '<div class="empty-garment shoes">Faltan zapatos</div>'}
          ${accessory ? `<div class="garment garment-accessory" style="--garment:${colorHex(accessory.color)}">${garmentContent(accessory,'👜')}</div>` : ''}
        </div>
      </div>
      <div class="avatar-controls">
        <div class="control-group"><h3>Tono de piel</h3><div class="option-row">${skinOptions.map(c => `<button class="color-option ${avatar.skin===c?'active':''}" style="--swatch:${c}" data-avatar-skin="${c}" aria-label="Elegir tono de piel"></button>`).join('')}</div></div>
        <div class="control-group"><h3>Color de cabello</h3><div class="option-row">${hairOptions.map(c => `<button class="color-option ${avatar.hair===c?'active':''}" style="--swatch:${c}" data-avatar-hair="${c}" aria-label="Elegir color de cabello"></button>`).join('')}</div></div>
        <div class="control-group"><h3>Peinado</h3><div class="option-row">${hairStyles.map(h => `<button class="style-option ${avatar.hairStyle===h.key?'active':''}" data-avatar-style="${h.key}">${h.label}</button>`).join('')}</div></div>
      </div>
      <p class="avatar-note">Esta vista es una ilustración para comparar colores y combinaciones. La posición y el ajuste real de las prendas pueden verse distintos al usarlas.</p>
      <div class="avatar-actions">
        <button class="ghost-button" data-go="create">Cambiar prendas</button>
        <button class="secondary-button" data-random-look>🎲 Otro look</button>
        <button class="primary-button" data-save-look>Guardar este look</button>
      </div>
    </section>`;
}

function renderCalendar() {
  const year = calendarCursor.getFullYear();
  const month = calendarCursor.getMonth();
  const firstDay = new Date(year, month, 1);
  const lastDay = new Date(year, month + 1, 0);
  const offset = (firstDay.getDay() + 6) % 7;
  const cells = [];
  for (let i = 0; i < offset; i++) cells.push('<span class="day-button blank"></span>');
  for (let d = 1; d <= lastDay.getDate(); d++) {
    const key = dateKey(new Date(year, month, d));
    const classes = ['day-button'];
    if (key === dateKey(new Date())) classes.push('today');
    if (key === selectedDate) classes.push('selected');
    if (data.schedule[key]) classes.push('has-look');
    cells.push(`<button class="${classes.join(' ')}" data-date="${key}">${d}</button>`);
  }
  const assignedLook = data.looks.find(l => l.id === data.schedule[selectedDate]);
  return `
    <section>
      <div class="screen-header"><div><p class="eyebrow">Planifica con estilo</p><h2>Calendario</h2><p>Guarda un look para cada ocasión</p></div></div>
      <div class="calendar-card">
        <div class="calendar-toolbar"><button data-calendar-prev>‹</button><h3>${new Intl.DateTimeFormat('es-HN',{month:'long',year:'numeric'}).format(calendarCursor)}</h3><button data-calendar-next>›</button></div>
        <div class="weekdays"><span>Lun</span><span>Mar</span><span>Mié</span><span>Jue</span><span>Vie</span><span>Sáb</span><span>Dom</span></div>
        <div class="calendar-grid">${cells.join('')}</div>
      </div>
      <div class="schedule-panel">
        <h3 style="text-transform:capitalize">${formatSelectedDate(selectedDate)}</h3>
        <p>${assignedLook ? `Tienes asignado: ${escapeHtml(assignedLook.name)}` : 'Todavía no has elegido un look para este día.'}</p>
        <select class="schedule-select" id="scheduleLookSelect">
          <option value="">Sin look asignado</option>
          ${data.looks.map(l => `<option value="${l.id}" ${assignedLook?.id === l.id ? 'selected' : ''}>${escapeHtml(l.name)}</option>`).join('')}
        </select>
        <button class="primary-button" data-assign-look style="width:100%">Guardar planificación</button>
      </div>
    </section>`;
}

function renderFavorites() {
  const favoriteItems = data.items.filter(i => i.favorite);
  return `
    <section>
      <div class="screen-header"><div><p class="eyebrow">Tus elegidos</p><h2>Favoritos</h2><p>Looks y prendas que amas</p></div></div>
      <div class="section-title"><h3>Looks guardados</h3><button data-go="create">Crear nuevo</button></div>
      ${data.looks.length ? data.looks.map(look => renderLookCard(look)).join('') : `<div class="empty-state"><span>✨</span><h3>Aún no guardas looks</h3><p>Crea una combinación y aparecerá aquí.</p><button class="primary-button" data-go="create">Crear mi primer look</button></div>`}
      <div class="section-title"><h3>Prendas favoritas</h3><button data-go="wardrobe">Ver armario</button></div>
      <div class="wardrobe-grid">
        ${favoriteItems.length ? favoriteItems.map(item => `<article class="clothing-card"><div class="clothing-image">${itemVisual(item)}</div><button class="favorite-toggle" data-favorite-item="${item.id}">💖</button><div class="clothing-info"><strong>${escapeHtml(item.name)}</strong><small>${escapeHtml(item.color)} · ${escapeHtml(item.style)}</small></div></article>`).join('') : `<div class="empty-state"><span>🤍</span><h3>No hay favoritas todavía</h3><p>Toca el corazón de una prenda para guardarla aquí.</p></div>`}
      </div>
    </section>`;
}

function renderLookCard(look) {
  return `<article class="look-card">
    <div class="look-card-head"><div><h3>${escapeHtml(look.name)}</h3><small>${new Intl.DateTimeFormat('es-HN',{day:'numeric',month:'short'}).format(new Date(look.createdAt))}</small></div><span>💖</span></div>
    <div class="look-preview">${slotConfig.map(slot => {
      const item = data.items.find(i => i.id === look.items[slot.key]);
      return `<div class="look-piece">${item ? itemVisual(item) : slot.emoji}</div>`;
    }).join('')}</div>
    <div class="look-card-actions"><button class="ghost-button" data-use-look="${look.id}">Editar</button><button style="background:#ffe7ef;color:#c63b6f" data-delete-look="${look.id}">Eliminar</button></div>
  </article>`;
}

function bindScreenEvents() {
  document.querySelectorAll('[data-go]').forEach(el => el.addEventListener('click', () => navigate(el.dataset.go)));
  document.querySelectorAll('[data-open-add]').forEach(el => el.addEventListener('click', () => openModal(addItemModal)));
  document.querySelectorAll('[data-category]').forEach(el => el.addEventListener('click', () => { currentCategory = el.dataset.category; render(); }));
  document.querySelectorAll('[data-favorite-item]').forEach(el => el.addEventListener('click', () => toggleFavorite(el.dataset.favoriteItem)));
  document.querySelectorAll('[data-delete-item]').forEach(el => el.addEventListener('click', () => deleteItem(el.dataset.deleteItem)));
  document.querySelectorAll('[data-slot]').forEach(el => el.addEventListener('click', () => { currentPickerSlot = el.dataset.slot; render(); }));
  document.querySelectorAll('[data-pick-item]').forEach(el => el.addEventListener('click', () => { currentLook[currentPickerSlot] = el.dataset.pickItem; render(); }));
  document.querySelectorAll('[data-random-look]').forEach(el => el.addEventListener('click', randomizeLook));
  document.querySelectorAll('[data-clear-look]').forEach(el => el.addEventListener('click', () => { currentLook = { top:null,bottom:null,shoes:null,accessory:null }; render(); }));
  document.querySelectorAll('[data-save-look]').forEach(el => el.addEventListener('click', saveCurrentLook));
  document.querySelectorAll('[data-view-outfit]').forEach(el => el.addEventListener('click', () => navigate('mannequin')));
  document.querySelectorAll('[data-avatar-skin]').forEach(el => el.addEventListener('click', () => updateAvatar('skin', el.dataset.avatarSkin)));
  document.querySelectorAll('[data-avatar-hair]').forEach(el => el.addEventListener('click', () => updateAvatar('hair', el.dataset.avatarHair)));
  document.querySelectorAll('[data-avatar-style]').forEach(el => el.addEventListener('click', () => updateAvatar('hairStyle', el.dataset.avatarStyle)));
  document.querySelectorAll('[data-calendar-prev]').forEach(el => el.addEventListener('click', () => { calendarCursor = new Date(calendarCursor.getFullYear(), calendarCursor.getMonth()-1,1); render(); }));
  document.querySelectorAll('[data-calendar-next]').forEach(el => el.addEventListener('click', () => { calendarCursor = new Date(calendarCursor.getFullYear(), calendarCursor.getMonth()+1,1); render(); }));
  document.querySelectorAll('[data-date]').forEach(el => el.addEventListener('click', () => { selectedDate = el.dataset.date; render(); }));
  document.querySelectorAll('[data-assign-look]').forEach(el => el.addEventListener('click', assignLook));
  document.querySelectorAll('[data-delete-look]').forEach(el => el.addEventListener('click', () => deleteLook(el.dataset.deleteLook)));
  document.querySelectorAll('[data-use-look]').forEach(el => el.addEventListener('click', () => useLook(el.dataset.useLook)));
}


function updateAvatar(key, value) {
  data.avatar = { ...(data.avatar || {}), [key]: value };
  saveData();
  render();
}

function toggleFavorite(id) {
  const item = data.items.find(i => i.id === id);
  if (!item) return;
  item.favorite = !item.favorite;
  saveData(); render();
}
function deleteItem(id) {
  const item = data.items.find(i => i.id === id);
  if (!item || !confirm(`¿Eliminar “${item.name}”?`)) return;
  data.items = data.items.filter(i => i.id !== id);
  Object.keys(currentLook).forEach(k => { if (currentLook[k] === id) currentLook[k] = null; });
  saveData(); render(); showToast('Prenda eliminada');
}
function randomizeLook() {
  slotConfig.forEach(slot => {
    const options = data.items.filter(i => slot.categories.includes(i.category));
    currentLook[slot.key] = options.length ? options[Math.floor(Math.random()*options.length)].id : null;
  });
  const stayInMannequin = currentScreen === 'mannequin';
  currentScreen = stayInMannequin ? 'mannequin' : 'create';
  document.querySelectorAll('.nav-item').forEach(btn => btn.classList.toggle('active', btn.dataset.screen === 'create'));
  render(); showToast('¡Nueva combinación creada!');
}
function saveCurrentLook() {
  const count = Object.values(currentLook).filter(Boolean).length;
  if (count < 2) { showToast('Elige al menos dos prendas'); return; }
  const name = prompt('Ponle un nombre a este look:', `Look ${data.looks.length + 1}`);
  if (!name) return;
  data.looks.unshift({ id: uid(), name: name.trim().slice(0,40), items: {...currentLook}, createdAt: new Date().toISOString() });
  saveData(); showToast('Look guardado en Favoritos'); navigate('favorites');
}
function assignLook() {
  const select = document.getElementById('scheduleLookSelect');
  if (select.value) data.schedule[selectedDate] = select.value;
  else delete data.schedule[selectedDate];
  saveData(); render(); showToast('Planificación guardada');
}
function deleteLook(id) {
  if (!confirm('¿Eliminar este look guardado?')) return;
  data.looks = data.looks.filter(l => l.id !== id);
  Object.keys(data.schedule).forEach(k => { if (data.schedule[k] === id) delete data.schedule[k]; });
  saveData(); render(); showToast('Look eliminado');
}
function useLook(id) {
  const look = data.looks.find(l => l.id === id);
  if (!look) return;
  currentLook = {...look.items}; navigate('create');
}

// Global navigation and modal controls
document.querySelectorAll('.nav-item').forEach(btn => btn.addEventListener('click', () => navigate(btn.dataset.screen)));
document.querySelectorAll('[data-close-modal]').forEach(btn => btn.addEventListener('click', closeModals));
modalBackdrop.addEventListener('click', closeModals);
document.getElementById('settingsButton').addEventListener('click', () => openModal(settingsModal));
document.getElementById('profileButton').addEventListener('click', () => showToast('Tu perfil personal llegará en la siguiente versión'));

document.getElementById('itemPhoto').addEventListener('change', event => {
  const file = event.target.files?.[0];
  if (!file) return;
  if (file.size > 5 * 1024 * 1024) { showToast('La imagen debe pesar menos de 5 MB'); event.target.value = ''; return; }
  const reader = new FileReader();
  reader.onload = () => {
    photoDataUrl = reader.result;
    document.getElementById('photoPreview').innerHTML = `<img src="${photoDataUrl}" alt="Vista previa">`;
  };
  reader.readAsDataURL(file);
});

document.getElementById('addItemForm').addEventListener('submit', event => {
  event.preventDefault();
  const category = document.getElementById('itemCategory').value;
  data.items.unshift({
    id: uid(),
    name: document.getElementById('itemName').value.trim(),
    category,
    color: document.getElementById('itemColor').value,
    style: document.getElementById('itemStyle').value,
    emoji: categoryEmoji[category],
    image: photoDataUrl,
    favorite: false
  });
  saveData();
  event.target.reset();
  photoDataUrl = '';
  document.getElementById('photoPreview').textContent = '📸';
  closeModals();
  currentCategory = 'all';
  showToast('Prenda guardada en tu armario');
  navigate('wardrobe');
});

document.getElementById('resetButton').addEventListener('click', () => {
  if (!confirm('¿Restablecer Closet Play y borrar tus datos locales?')) return;
  data = seedData(); currentLook = {top:null,bottom:null,shoes:null,accessory:null}; saveData(); closeModals(); render(); showToast('Demostración restablecida');
});

window.addEventListener('beforeinstallprompt', event => {
  event.preventDefault();
  deferredInstallPrompt = event;
});
document.getElementById('installButton').addEventListener('click', async () => {
  closeModals();
  if (deferredInstallPrompt) {
    deferredInstallPrompt.prompt();
    await deferredInstallPrompt.userChoice;
    deferredInstallPrompt = null;
  } else {
    alert('En iPhone abre Closet Play en Safari, toca Compartir y elige “Agregar a pantalla de inicio”.');
  }
});

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('./service-worker.js').catch(() => {}));
}

render();

  </script>
</body>
</html>
